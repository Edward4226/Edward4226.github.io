name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: IndexNow ping (Bing/Yandex fast indexing)
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https://edward4226.github.io/&key=f3a8c1d92b7e4065a4cb98d12ef60371" || true
      - name: Wayback Machine archive
        run: |
          curl -s -m 90 "https://web.archive.org/save/https://edward4226.github.io/" -o /dev/null || true
